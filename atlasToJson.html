<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script type="module">
        const xml = await fetch('./public/spritesheet_double.xml');
        const text = await xml.text();
        const doc = new DOMParser().parseFromString(text, 'text/xml');
        const sprites = {};
        for (const subTexture of doc.querySelectorAll('SubTexture')) {
            sprites[subTexture.getAttribute('name').replace('.png', '')] = {
                x: parseInt(subTexture.getAttribute('x')),
                y: parseInt(subTexture.getAttribute('y')),
                width: parseInt(subTexture.getAttribute('width')),
                height: parseInt(subTexture.getAttribute('height')),
            };
        }
        console.log(JSON.stringify(sprites, null, 2));
    </script>
</body>

</html>
